name: DoNotSleep
options:
  createIntermediateGroups: true
  developmentLanguage: en
  deploymentTarget:
    macOS: "13.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 94B85DGKCM
    MACOSX_DEPLOYMENT_TARGET: "13.0"
targets:
  DoNotSleep:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources/DoNotSleep
      - path: Support/AppIcon.icns
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: "Do Not Sleep"
        PRODUCT_BUNDLE_IDENTIFIER: im.umo.dns
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/DoNotSleep.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: NO
    scheme:
      configVariants: []
